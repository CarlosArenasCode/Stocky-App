name: "Bug"
description: "Reporte de bug"
title: "BUG: "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "Resumen"
      placeholder: "Qué pasa y qué debería pasar"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Pasos para reproducir"
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Resultado esperado"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Resultado actual"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Entorno"
      placeholder: "OS / navegador / versión / commit"
    validations:
      required: false